<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuralEd - Adaptive Learning Platform</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4fc3a1;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --warning-color: #ffc107;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            background-image: linear-gradient(to bottom right, #e6f0f9, #f9f9f9);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: hidden;
            background-color: white;
        }
        
        .illustration {
            flex: 1;
            background-color: var(--primary-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Q50,80 0,100 Z" fill="%23f8f9fa" opacity="0.1"/></svg>');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .illustration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 15s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10%, 10%); }
            100% { transform: translate(-10%, -10%); }
        }
        
        .illustration h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
            z-index: 1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        
        .illustration p {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 2rem;
            z-index: 1;
            max-width: 80%;
            line-height: 1.6;
        }
        
        .illustration img {
            width: 70%;
            max-width: 300px;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }
        
        .login-form {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: white;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo img {
            height: 50px;
        }
        
        .logo h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-top: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.2);
            outline: none;
        }
        
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
        }
        
        .remember-me input {
            margin-right: 0.5rem;
        }
        
        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .divider {
            margin: 1.5rem 0;
            text-align: center;
            position: relative;
            color: #777;
        }
        
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background-color: #ddd;
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .social-login {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .social-btn i {
            font-size: 1.2rem;
        }
        
        .facebook { color: #3b5998; }
        .google { color: #db4437; }
        .twitter { color: #1da1f2; }
        
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        
        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }
            
            .illustration {
                padding: 1.5rem;
            }
            
            .illustration h2 {
                font-size: 1.8rem;
            }
            
            .login-form {
                padding: 2rem;
            }
        }
        
        /* Animation classes */
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        /* Accessibility focus styles */
        a:focus, button:focus, input:focus {
            outline: 3px solid var(--accent-color);
            outline-offset: 2px;
        }
        
        /* Offline indicator */
        .offline-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ff6b6b;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }
        
        /* Simple mode toggle */
        .simple-mode {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.9rem;
            z-index: 10;
        }
        
        /* Simple mode styles */
        body.simple-mode {
            background: white;
        }
        
        body.simple-mode .container {
            box-shadow: none;
            border: 1px solid #ddd;
        }
        
        body.simple-mode .illustration {
            display: none;
        }
        
        body.simple-mode .login-form {
            flex: 1;
        }
        
        body.simple-mode .options,
        body.simple-mode .divider,
        body.simple-mode .social-login {
            display: none;
        }
        
        body.simple-mode .form-group input {
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-top: none;
            border-bottom: 2px solid #ddd;
            padding: 10px 0;
        }
        
        body.simple-mode .btn {
            border-radius: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <button class="simple-mode" id="simpleModeToggle">
        <i class="fas fa-adjust"></i> Simple Mode
    </button>
    
    <div class="container">
        <div class="illustration">
            <h2>Personalized Learning for Everyone</h2>
            <p>Our adaptive platform tailors education to your needs, works offline, and understands your learning style.</p>
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><circle cx='100' cy='100' r='80' fill='none' stroke='white' stroke-width='8'/><path d='M50,100 Q100,30 150,100 T250,100' fill='none' stroke='white' stroke-width='8' stroke-linecap='round'/><circle cx='70' cy='80' r='10' fill='white'/><circle cx='130' cy='80' r='10' fill='white'/></svg>" alt="Education Illustration">
        </div>
        
        <div class="login-form">
            <div class="logo">
                <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M30,10 L70,10 L90,50 L70,90 L30,90 L10,50 Z' fill='%234a6fa5'/><text x='50' y='60' font-family='Arial' font-size='30' fill='white' text-anchor='middle' dominant-baseline='middle'>R</text></svg>" alt="RuralEd Logo">
                <h1>RuralEd</h1>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <div class="forgot-password">
                        <a href="#">Forgot password?</a>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
                
                <div class="divider">or continue with</div>
                
                <div class="social-login">
                    <div class="social-btn facebook" title="Login with Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </div>
                    <div class="social-btn google" title="Login with Google">
                        <i class="fab fa-google"></i>
                    </div>
                    <div class="social-btn twitter" title="Login with Twitter">
                        <i class="fab fa-twitter"></i>
                    </div>
                </div>
                
                <div class="signup-link">
                    Don't have an account? <a href="#">Sign up</a>
                </div>
            </form>
        </div>
    </div>
    
    <div class="offline-indicator" id="offlineIndicator">
        <i class="fas fa-wifi"></i> You're currently offline. Working in limited mode.
    </div>
    
    <script>
        // Simple mode toggle
        const simpleModeToggle = document.getElementById('simpleModeToggle');
        simpleModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('simple-mode');
            const icon = simpleModeToggle.querySelector('i');
            if (document.body.classList.contains('simple-mode')) {
                icon.classList.remove('fa-adjust');
                icon.classList.add('fa-expand');
                simpleModeToggle.title = "Switch to standard mode";
            } else {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-adjust');
                simpleModeToggle.title = "Switch to simple mode";
            }
        });
        
        // Form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple validation
            if (username.trim() === '' || password.trim() === '') {
                loginForm.classList.add('shake');
                setTimeout(() => {
                    loginForm.classList.remove('shake');
                }, 500);
                return;
            }
            
            // In a real app, you would send this to your server
            console.log('Login attempt with:', { username, password });
            
            // Simulate login process
            simulateLogin();
        });
        
        function simulateLogin() {
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;
            
            // Simulate network request
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Login successful!';
                
                // Redirect to dashboard after a delay
                setTimeout(() => {
                    // In a real app, you would redirect to the dashboard
                    // alert('Redirecting to dashboard...');
                    window.location.href = 'interface.html';
                }, 1000);
            }, 2000);
        }
        
        // Offline detection
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        function updateOnlineStatus() {
            const offlineIndicator = document.getElementById('offlineIndicator');
            if (!navigator.onLine) {
                offlineIndicator.style.display = 'block';
                
                // In a real app, you would enable offline capabilities here
                console.log('Offline mode activated');
            } else {
                offlineIndicator.style.display = 'none';
                console.log('Back online');
            }
        }
        
        // Initialize
        updateOnlineStatus();
        
        // Check for camera access (for optional emotion detection)
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            console.log('Camera access is available for emotion detection');
            // You would implement emotion detection here if enabled
        }
        
        // Local storage for offline functionality
        if (typeof(Storage) !== "undefined") {
            console.log('Local storage available for offline functionality');
            
            // Example of storing login info if "Remember me" is checked
            const rememberCheckbox = document.getElementById('remember');
            const usernameInput = document.getElementById('username');

            // Load saved credentials if they exist
            if (localStorage.rememberedUsername) {
                usernameInput.value = localStorage.rememberedUsername;
                rememberCheckbox.checked = true;
            }
            
            rememberCheckbox.addEventListener('change', function() {
                if (this.checked && usernameInput.value) {
                    localStorage.rememberedUsername = usernameInput.value;
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
            });
        }
    </script>
</body>
</html>
